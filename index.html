<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <script>
    (() => {
      try {
        const theme = localStorage.getItem('cheerit_theme');
        if (theme === 'dark' || theme === 'light') {
          document.documentElement.dataset.theme = theme;
          document.documentElement.style.colorScheme = theme;
        }
      } catch {}
    })();
  </script>

  <!-- Favicon -->
  <link rel="icon" type="image/png" href="/images/cheeritlogo.png" />

  <title>Cheer IT</title>
</head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
